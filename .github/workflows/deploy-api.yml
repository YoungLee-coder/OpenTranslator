name: Deploy OpenTranslator API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared-types/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# 同一时间只跑一个部署，避免并发覆盖
concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      ORIGINS: ${{ secrets.ORIGINS }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @opentranslator/api typecheck

      - name: Disable wrangler telemetry
        run: pnpm --filter @opentranslator/api exec wrangler telemetry disable

      - name: Ensure D1 database exists
        working-directory: apps/api
        run: |
          if [ -n "$D1_DATABASE_ID" ]; then
            echo "Using provided D1_DATABASE_ID"
            exit 0
          fi
          set +e
          LIST=$(pnpm wrangler d1 list --json 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then echo "$LIST"; exit 1; fi
          if echo "$LIST" | jq -e '.[] | select(.name == "opentranslator")' >/dev/null; then
            echo "D1 opentranslator already exists"
          else
            pnpm wrangler d1 create opentranslator
          fi

      - name: Ensure KV namespace exists
        working-directory: apps/api
        run: |
          if [ -n "$KV_NAMESPACE_ID" ]; then
            echo "Using provided KV_NAMESPACE_ID"
            exit 0
          fi
          set +e
          LIST=$(pnpm wrangler kv namespace list 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then echo "$LIST"; exit 1; fi
          if echo "$LIST" | jq -e '.[] | select(.title == "SETTINGS_KV")' >/dev/null; then
            echo "KV SETTINGS_KV already exists"
          else
            pnpm wrangler kv namespace create SETTINGS_KV
          fi

      - name: Deploy Worker
        id: deploy
        working-directory: apps/api
        run: |
          pnpm wrangler deploy 2>&1 | tee deploy.log || true
          DEPLOY_EXIT=${PIPESTATUS[0]}
          if [ $DEPLOY_EXIT -ne 0 ]; then exit 1; fi
          WORKER_URL=$(grep -oE "https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev" deploy.log | head -1 || echo "")
          if [ -n "$CUSTOM_DOMAIN" ]; then
            WORKER_URL="https://$CUSTOM_DOMAIN"
          fi
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "Worker URL: $WORKER_URL"

      - name: Initialize database
        run: |
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          if [ -z "$WORKER_URL" ]; then
            echo "Worker URL not found, skipping init"
            exit 1
          fi
          sleep 10
          echo "Calling $WORKER_URL/api/init/$JWT_SECRET"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o response.txt "$WORKER_URL/api/init/$JWT_SECRET")
          BODY=$(cat response.txt)
          echo "HTTP: $HTTP_CODE, Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Init failed"
            exit 1
          fi
          echo "Database initialized successfully"
