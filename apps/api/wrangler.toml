name = "opentranslator"
main = "src/index.ts"
compatibility_date = "2025-11-01"

# Static assets — 前端打包产物（pnpm --filter @opentranslator/web build 输出到 ./dist）。
# 同一个 Worker 既服务 SPA 又处理 /api/*，一次部署全搞定，同源无需 CORS。
[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

# D1 database — 在 Dashboard 创建后，到 Worker → Settings → Bindings 里绑定，
# binding 名必须填 "DB"（与代码 env.DB 对应），无需在此手填 database_id。
#[[d1_databases]]
#binding = "DB"
#database_name = "opentranslator"
#database_id = ""

# KV namespace — 同上，在 Dashboard 绑定，binding 名必须填 "SETTINGS_KV"。
#[[kv_namespaces]]
#binding = "SETTINGS_KV"
#id = ""

# Durable Object: per-IP sliding-window rate limiter（无需 ID，部署时自动创建）
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[vars]
ENV = "development"
# ORIGINS = "https://your-domain.com"   # 跨域来源白名单（逗号分隔）；同源部署时无需填写

# Secrets — 在 Dashboard → Worker → Settings → Variables and Secrets 添加：
#   JWT_SECRET       （随机字符串，32 位以上，同时作为 /api/init 的访问凭证）
#   ENCRYPTION_KEY   （随机字符串，32 位以上，务必备份，丢了等于所有供应商密钥作废）

# 构建命令 — Cloudflare Workers Builds 连接仓库时会自动读这一段，
# Dashboard 里无需手填 build / deploy 命令。
[build]
command = "pnpm --filter @opentranslator/web build"
